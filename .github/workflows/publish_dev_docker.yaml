name: Publish Dev Docker Image

on:
  workflow_dispatch: { }
  push:
    branches:
      - master
    paths:
      - '.devcontainer/Dockerfile'
      - '.github/workflows/publish_dev_docker.yaml'

env:
  IMAGE_NAME: fzyzcjy/flutter_rust_bridge_dev

jobs:
  publish:
    name: Build, Test and Publish Dev Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.11.0
          architecture: x64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish dev docker via frb_internal
        shell: bash
        run: |
          set -euo pipefail

          ./frb_internal publish-dev-docker \
            --image-name "${IMAGE_NAME}" \
            --short-sha "${GITHUB_SHA::7}" \
            --push \
            --github-summary-path "${GITHUB_STEP_SUMMARY}"
