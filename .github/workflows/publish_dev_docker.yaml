name: Publish Dev Docker Image

on:
  workflow_dispatch: { }
  push:
    branches:
      - master
    paths:
      - '.devcontainer/Dockerfile'
      - '.github/workflows/publish_dev_docker.yaml'

env:
  IMAGE_NAME: fzyzcjy/flutter_rust_bridge_dev

jobs:
  publish:
    name: Build, Test and Publish Dev Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute metadata from Dockerfile
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          metadata_json="$(./frb_internal dev-docker-metadata)"
          short_sha="${GITHUB_SHA::7}"
          export METADATA_JSON="${metadata_json}"
          export SHORT_SHA="${short_sha}"

          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
import json
import os

data = json.loads(os.environ["METADATA_JSON"])
image_name = os.environ["IMAGE_NAME"]
short_sha = os.environ["SHORT_SHA"]
sha_tag = f"sha-{short_sha}"
image_ref = data["image_ref"]
tags = [
    f"{image_name}:latest",
    image_ref,
    f"{image_name}:{sha_tag}",
]

print(f"flutter_version={data['flutter_version']}")
print(f"rust_version={data['rust_version']}")
print(f"rust_nightly_version={data['rust_nightly_version']}")
print(f"version_tag={data['version_tag']}")
print(f"image_ref={image_ref}")
print(f"sha_tag={sha_tag}")
print(f"local_tag=frb-dev-image-smoke:{short_sha}")
print("tags<<EOF")
for tag in tags:
    print(tag)
print("EOF")
PY

      - name: Build local image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.metadata.outputs.local_tag }}

      - name: Smoke test local image
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm "${{ steps.metadata.outputs.local_tag }}" bash -lc '
            set -euo pipefail
            flutter --version
            dart --version
            cargo --version
            rustup show
            rustup target list --toolchain nightly-${{ steps.metadata.outputs.rust_nightly_version }} --installed
            wasm-pack --version
            "${CHROME_BIN}" --version
            rustup target list --toolchain nightly-${{ steps.metadata.outputs.rust_nightly_version }} --installed | grep wasm32-unknown-unknown
            rustup show | grep "nightly-${{ steps.metadata.outputs.rust_nightly_version }}"
          '

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}

      - name: Publish workflow summary
        shell: bash
        run: |
          {
            echo "## Dev Docker Image Published"
            echo
            echo "- Repository: \`${IMAGE_NAME}\`"
            echo "- Flutter: \`${{ steps.metadata.outputs.flutter_version }}\`"
            echo "- Rust: \`${{ steps.metadata.outputs.rust_version }}\`"
            echo "- Rust nightly: \`${{ steps.metadata.outputs.rust_nightly_version }}\`"
            echo "- Image ref: \`${{ steps.metadata.outputs.image_ref }}\`"
            echo "- Tags:"
            echo "  - \`latest\`"
            echo "  - \`${{ steps.metadata.outputs.version_tag }}\`"
            echo "  - \`${{ steps.metadata.outputs.sha_tag }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
