name: Precommit Autofix

on:
  pull_request: { }
  workflow_dispatch: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  precommit_autofix:
    name: Generate precommit autofix patch
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.11.0
          architecture: x64

      - name: Run precommit autofix via frb_internal
        id: autofix
        shell: bash
        run: |
          set -euo pipefail

          ./frb_internal precommit-autofix-in-dev-container \
            --mode slow \
            --output "${GITHUB_WORKSPACE}/precommit-autofix.diff" \
            --github-run-id "${GITHUB_RUN_ID}" \
            --github-output-path "${GITHUB_OUTPUT}" \
            --github-summary-path "${GITHUB_STEP_SUMMARY}" \
            --github-notice

      - name: Upload patch artifact
        if: ${{ steps.autofix.outputs.has_patch == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: precommit-autofix-diff
          path: precommit-autofix.diff
