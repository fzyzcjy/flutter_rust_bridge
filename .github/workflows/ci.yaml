name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed
      - labeled
      - unlabeled
  workflow_dispatch:
    inputs:
      ci_filter:
        description: 'CI filter, e.g. test_dart_web[package=frb_dart], or full'
        required: true
        default: full
        type: string

run-name: ${{ github.event_name == 'workflow_dispatch' && format('CI ({0})', inputs.ci_filter) || 'CI' }}

env:
  CARGO_TERM_COLOR: always
  FRB_MAIN_RUST_VERSION: 1.93.1
  FRB_MAIN_DART_VERSION: 3.11.0
  FRB_MAIN_FLUTTER_VERSION: 3.44.0
  FRB_OHOS_SDK_VERSION: 5.1.0.840
  FRB_OHOS_FLUTTER_BRANCH: oh-3.41.9-dev
  FRB_RUSTFMT_NIGHTLY_VERSION: nightly-2025-02-01
  FRB_OHOS_FLUTTER_REF: 6d7e5b43fb43bb85ba0a59e3469299ebcf45a637

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plan_ci:
    if: ${{ github.event.action != 'closed' }}
    name: 'Plan :: CI'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      plan: ${{ steps.plan.outputs.plan }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64
      - id: plan
        run: |-
          ./frb_internal plan-ci \
            --filter '${{ inputs.ci_filter || 'full' }}' \
            --automatic-ci-disabled=${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-manual-dispatch') }} \
            --github-output "$GITHUB_OUTPUT"
      - name: Comment on matching pull request
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.ref;

            if (!ref.startsWith('refs/heads/')) {
              core.notice(`Manual CI dispatch ref ${ref} is not a branch; skipping PR comment.`);
              return;
            }

            const branch = ref.substring('refs/heads/'.length);
            const pullRequests = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 100,
            });

            if (pullRequests.length === 0) {
              core.notice(`No open PR found for branch ${branch}; skipping PR comment.`);
              return;
            }

            const pullRequest = pullRequests[0];
            const marker = `<!-- ci-manual-dispatch-comment:${context.runId} -->`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const ciFilter = context.payload.inputs?.ci_filter ?? 'full';
            const body = [
              marker,
              '## Manual CI dispatch',
              '',
              `Filter: \`${ciFilter}\``,
              `Run: [${context.runId}](${runUrl})`,
              `Branch: \`${branch}\``,
              '',
              'This is a manually dispatched CI run. It is not the normal automatic PR CI surface.',
              '',
            ].join('\n');

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pullRequest.number,
                per_page: 100,
              });
              const existingComment = comments.find(
                (comment) =>
                  comment.user?.type === 'Bot' &&
                  typeof comment.body === 'string' &&
                  comment.body.includes(marker),
              );

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingComment.id,
                  body,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullRequest.number,
                body,
              });
            } catch (error) {
              core.warning(`Could not write manual CI dispatch PR comment: ${error.message}`);
            }

  # ----------------------------------- deploy -----------------------------------

  # ref https://docusaurus.io/docs/deployment#triggering-deployment-with-github-actions
  deploy_website:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).deploy_website.enable == true }}
    name: 'Deploy :: Website'
    runs-on: ubuntu-latest

    steps:
      # setup
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          target: wasm32-unknown-unknown
          components: rust-src,rustfmt
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: yarn
          cache-dependency-path: website/yarn.lock
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v1
        with:
          mdbook-version: "latest"
      - name: Setup `mdbook-mermaid`
        run: cargo install mdbook-mermaid

      # execute
      - run: ./frb_internal generate-website

      # deploy
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/merged_target/flutter_rust_bridge

  # ----------------------------------- lint -----------------------------------

  lint_rust_primary:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).lint_rust_primary.enable == true }}
    name: 'Lint :: Rust :: Primary'
    runs-on: ubuntu-latest

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt, clippy
      - run: |-
          rustup toolchain install ${{ env.FRB_RUSTFMT_NIGHTLY_VERSION }}
          rustup component add rustfmt --toolchain ${{ env.FRB_RUSTFMT_NIGHTLY_VERSION }}-x86_64-unknown-linux-gnu
          rustup target add wasm32-unknown-unknown

      # execute
      - run: ./frb_internal lint-rust

  lint_dart_primary:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).lint_dart_primary.enable == true }}
    name: 'Lint :: Dart :: Primary'
    runs-on: ubuntu-latest

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}

      # execute
      - run: ./frb_internal lint-dart

  lint_rust_feature_flag:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).lint_rust_feature_flag.enable == true }}
    name: 'Lint :: Rust :: Feature flag'
    runs-on: ubuntu-latest

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt, clippy
      - uses: taiki-e/install-action@cargo-hack
      - run: |-
          rustup toolchain install ${{ env.FRB_RUSTFMT_NIGHTLY_VERSION }}
          rustup component add rustfmt --toolchain ${{ env.FRB_RUSTFMT_NIGHTLY_VERSION }}-x86_64-unknown-linux-gnu
          rustup target add wasm32-unknown-unknown

      # execute
      - run: ./frb_internal lint-rust-feature-flag

  # ----------------------------------- codegen -----------------------------------
  # instead of running this explicit test for frb_codegen and frb_rust only, we run the test for
  # all rust packages in the job "test_rust". While this would not be needed for these other packages,
  # we avoid a ci dependency to cargo-msrv.
  # However, the code is left commented here in case this decission changes.
  # msrv:
  #   name: 'Test :: FRB Codegen :: MSRV'
  #   runs-on: ubuntu-latest
  #   steps:
  #   - uses: actions/checkout@v2

  #   - name: Install Rust
  #     uses: actions-rs/toolchain@v1
  #     with:
  #       toolchain: stable

  #   - name: Verify MSRV for frb_codegen
  #     run: |
  #       cargo install cargo-msrv
  #       cargo msrv --path frb_codegen verify

  #   - name: Verify MSRV for frb_rust
  #     run: |
  #       cargo install cargo-msrv
  #       cargo msrv --path frb_rust verify

  generate_run_frb_codegen_command_generate:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).generate_run_frb_codegen_command_generate.enable == true }}
    name: 'Generate :: FRB Codegen :: Command Generate'
    runs-on: ${{ matrix.image }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).generate_run_frb_codegen_command_generate.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt, clippy
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      - run: cargo install cargo-llvm-cov --version ${{ matrix.info.version == '1.85.0' && '0.6.21' || '0.6.24' }} --locked

      # execute
      - run: ./frb_internal generate-run-frb-codegen-command-generate --set-exit-if-changed --package ${{ matrix.package }} --coverage

      # report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }}--${{ matrix.image }}--${{ matrix.package }}--coverage
          path: target/coverage

  generate_run_frb_codegen_command_integrate:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).generate_run_frb_codegen_command_integrate.enable == true }}
    name: 'Generate :: FRB Codegen :: Command Integrate'
    runs-on: ${{ matrix.image }}
    env:
      RUST_LOG: debug

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).generate_run_frb_codegen_command_integrate.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt, clippy
      - if: matrix.platforms != 'ohos'
        uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      - if: matrix.platforms == 'ohos'
        name: Setup HarmonyOS toolchain
        uses: ErBWs/setup-ohos@v1
        with:
          version: ${{ env.FRB_OHOS_SDK_VERSION }}
          cache: true
      - if: matrix.platforms == 'ohos'
        name: Setup JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - if: matrix.platforms == 'ohos'
        name: Setup flutter-ohos
        run: |
          bash .github/scripts/clone_ohos_flutter_for_ci.sh "$FRB_OHOS_FLUTTER_BRANCH" "$GITHUB_WORKSPACE/flutter"
          bash .github/scripts/patch_ohos_flutter_autofill_for_ci.sh "$GITHUB_WORKSPACE/flutter"
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH
      - if: matrix.platforms == 'ohos'
        name: Export OHOS_SDK_HOME
        shell: bash
        run: |
          echo "OHOS_SDK_HOME=${OHOS_NDK_HOME}/native" >> $GITHUB_ENV
      - run: cargo install cargo-llvm-cov --version ${{ matrix.info.version == '1.85.0' && '0.6.21' || '0.6.24' }} --locked

      # execute
      - run: ./frb_internal generate-run-frb-codegen-command-integrate --set-exit-if-changed --package ${{ matrix.package }} --coverage ${{ matrix.platforms == 'ohos' && '--include-ohos' || '' }}

      # report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }}--${{ matrix.image }}--${{ matrix.package }}--${{ matrix.platforms }}--coverage
          path: target/coverage

  generate_apple_scaffold:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).generate_apple_scaffold.enable == true }}
    name: 'Generate :: Apple Scaffold'
    runs-on: macos-15-intel

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt, clippy
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}

      # execute
      - run: ./frb_internal generate-apple-scaffold

  generate_internal:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).generate_internal.enable == true }}
    name: 'Generate :: Internal'
    runs-on: ubuntu-latest

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt, clippy
      - run: rustup toolchain install ${{ env.FRB_RUSTFMT_NIGHTLY_VERSION }} && rustup component add rustfmt llvm-tools-preview --toolchain ${{ env.FRB_RUSTFMT_NIGHTLY_VERSION }}-x86_64-unknown-linux-gnu
      - run: yarn global add all-contributors-cli
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      - run: cargo install cargo-llvm-cov --version ${{ matrix.info.version == '1.85.0' && '0.6.21' || '0.6.24' }} --locked

      # execute
      - run: ./frb_internal generate-internal --set-exit-if-changed --coverage

      # report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }}--coverage
          path: target/coverage

  # ----------------------------------- bench -----------------------------------

  bench_dart_native:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).bench_dart_native.enable == true }}
    name: 'Bench :: Dart :: Native'
    runs-on: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).bench_dart_native.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64

      # execute
      - run: ./frb_internal bench-dart-native

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}--${{ matrix.image }}--benchmark
          path: frb_example/pure_dart/build/simple_benchmark/benchmark_result.json

  bench_upload:
    name: 'Bench :: Upload'
    runs-on: ubuntu-latest
    # NOTE Even if some previous jobs failed, we still want partial info
    if: ${{ always() && !cancelled() && fromJSON(needs.plan_ci.outputs.plan).bench_upload.enable == true }}
    needs:
      - plan_ci
      # NOTE We do this to ensure bench upload *after* deploy website.
      # Otherwise, if they are run concurrently, they can push to git at the same time, causing failure for one of them
      - deploy_website
      - bench_dart_native

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: downloaded-artifacts/
          pattern: '*-benchmark'
      - run: tree downloaded-artifacts
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64

      - run: ./frb_internal bench-merge

      - uses: benchmark-action/github-action-benchmark@v1
        # Warn: https://github.com/benchmark-action/github-action-benchmark?tab=readme-ov-file#run-only-on-your-branches
        if: github.event_name != 'pull_request'
        with:
          name: Flutter Rust Bridge Benchmark
          tool: customSmallerIsBetter
          output-file-path: merged_benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

  # ----------------------------------- build -----------------------------------

  build_flutter:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).build_flutter.enable == true }}
    name: 'Build :: Flutter'
    runs-on: ${{ matrix.info.image }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).build_flutter.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # https://docs.flutter.dev/get-started/install/linux#linux-prerequisites
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - if: matrix.info.target != 'ohos'
        uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      - if: matrix.info.target == 'ohos'
        name: Setup HarmonyOS toolchain
        uses: ErBWs/setup-ohos@v1
        with:
          version: ${{ env.FRB_OHOS_SDK_VERSION }}
          cache: true
      - if: matrix.info.target == 'ohos'
        name: Setup JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - if: matrix.info.target == 'ohos'
        name: Setup flutter-ohos
        run: |
          bash .github/scripts/clone_ohos_flutter_for_ci.sh "$FRB_OHOS_FLUTTER_BRANCH" "$GITHUB_WORKSPACE/flutter"
          bash .github/scripts/patch_ohos_flutter_autofill_for_ci.sh "$GITHUB_WORKSPACE/flutter"
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH
      - if: matrix.info.target == 'ohos'
        name: Export OHOS_SDK_HOME
        shell: bash
        run: |
          echo "OHOS_SDK_HOME=${OHOS_NDK_HOME}/native" >> $GITHUB_ENV

      # execute
      - run: ./frb_internal build-flutter --package ${{ matrix.info.package }} --target ${{ matrix.info.target }}
        env:
          FRB_OHOS_PATCH_FLUTTER_AUTOFILL_FOR_CI: ${{ matrix.info.target == 'ohos' && '1' || '0' }}
          FRB_OHOS_FLUTTER_AUTOFILL_PATCH_SCRIPT: .github/scripts/patch_ohos_flutter_autofill_for_ci.sh
          FRB_OHOS_FLUTTER_ROOT: ${{ github.workspace }}/flutter

      # report
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}--${{ matrix.info.package }}--${{ matrix.info.target }}--output
          path: target/build_flutter_output

  # ----------------------------------- test -----------------------------------

  test_mimic_quickstart:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_mimic_quickstart.enable == true }}
    name: 'Test :: MimicQuickstart'
    runs-on: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_mimic_quickstart.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      # https://docs.flutter.dev/get-started/install/linux#linux-prerequisites
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - if: runner.os == 'Linux'
        uses: pyvista/setup-headless-display-action@v4

      # execute
      - run: ./frb_internal test-mimic-quickstart --integration-backend ${{ matrix.integration_backend }}

  # TODO re-enable after next release (since need old_version != new_version)
  # test_upgrade:
  #   name: 'Test :: Upgrade'
  #   runs-on: ${{ matrix.image }}
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       image:
  #         - windows-2025
  #         # need macos-"13" because https://github.com/fzyzcjy/flutter_rust_bridge/issues/1225
  #         - macos-15-intel
  #         - ubuntu-latest

