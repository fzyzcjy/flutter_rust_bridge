  test_rust:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_rust.enable == true }}
    name: 'Test :: Rust'
    runs-on: ${{ matrix.info.image }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_rust.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.info.version || env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt
      # TODO cache (for rust-toolchain, also for cargo build)
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64
      - run: cargo install cargo-llvm-cov --version ${{ matrix.info.version == '1.85.0' && '0.6.21' || '0.6.24' }} --locked

      # execute
      - run: ./frb_internal test-rust --coverage

      # report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }}--${{ matrix.info.image }}--${{ matrix.info.version }}--coverage
          path: target/coverage

  test_dart_native:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_dart_native.enable == true }}
    name: 'Test :: Dart :: Native'
    runs-on: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_dart_native.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64
      - run: cargo install cargo-llvm-cov --version 0.6.24 --locked

      # execute
      - run: ./frb_internal test-dart-native --package ${{ matrix.package }} --coverage

      # report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }}--${{ matrix.image }}--${{ matrix.package }}--coverage
          path: target/coverage

  test_dart_web:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_dart_web.enable == true }}
    name: 'Test :: Dart :: Web'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_dart_web.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # https://github.com/puppeteer/puppeteer/pull/13196
      - name: Disable AppArmor
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-02-01
          target: wasm32-unknown-unknown
          components: rust-src,rustfmt
      - name: Cache dependencies
        id: test-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target
            frb_example--pure_dart/rust/target/
            frb_example--pure_dart/.local-chromium
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install web crates
        run: |
          which wasm-pack || sh -c "$(curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf)" '' -f
          wasm-bindgen --version | grep '0.2.100' || cargo +nightly-2025-02-01 install wasm-bindgen-cli --version 0.2.100 --locked --force

      # execute
      - run: ./frb_internal test-dart-web --package ${{ matrix.package }}

  test_dart_valgrind:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_dart_valgrind.enable == true }}
    name: 'Test :: Dart :: Valgrind'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_dart_valgrind.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64
      - run: sudo apt-get update

      # execute
      - run: ./frb_internal test-dart-valgrind --package ${{ matrix.package }}

  test_dart_sanitizer:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_dart_sanitizer.enable == true }}
    name: 'Test :: Dart :: Sanitizer'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_dart_sanitizer.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt
      - run: |-
          rustup toolchain install nightly
          rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.FRB_MAIN_DART_VERSION }}
          architecture: x64

      # execute
      - run: ./frb_internal test-dart-sanitizer --package ${{ matrix.package }} --sanitizer ${{ matrix.sanitizer }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # ref https://betterprogramming.pub/test-flutter-apps-on-android-with-github-actions-abdba2137b4
  test_flutter_native_android:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_native_android.enable == true }}
    name: 'Test :: Flutter :: Native:: Android'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_native_android.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        with:
          comment_on_pr: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      # Otherwise it fails and Flutter doctor say "You need Java 11 or higher to build your app with this version of Gradle."
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17.x"
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.device }}-api-level-${{ matrix.api-level }}
      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          force-avd-creation: false
          arch: x86_64
          # emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          # disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      # execute
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          # emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          arch: x86_64
          profile: ${{ matrix.device }}
          script: ./frb_internal test-flutter-native --flutter-test-args '--device-id emulator-5554' --package ${{ matrix.package }}

  # ref https://medium.com/flutter-community/run-flutter-driver-tests-on-github-actions-13c639c7e4ab
  test_flutter_native_ios:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_native_ios.enable == true }}
    name: 'Test :: Flutter :: Native:: iOS'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_native_ios.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: "Start Simulator"
        run: |
          xcrun xctrace list devices
          UDID=$(/usr/bin/python3 tools/find_ios_simulator_udid.py '${{ matrix.device }}')
          echo UDID=$UDID
          xcrun simctl boot "${UDID:?No Simulator with this name found}"
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}

      # execute
      - run: ./frb_internal test-flutter-native --package ${{ matrix.package }}

  test_flutter_native_desktop:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_native_desktop.enable == true }}
    name: 'Test :: Flutter :: Native:: ${{ matrix.info.platform }} (${{ matrix.info.package }})'
    runs-on: ${{ matrix.info.image }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_native_desktop.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # https://docs.flutter.dev/get-started/install/linux#linux-prerequisites
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - if: runner.os == 'Linux'
        uses: pyvista/setup-headless-display-action@v4
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}

      # execute
      - run: ./frb_internal test-flutter-native --flutter-test-args '--device-id ${{ matrix.info.platform }}' --package ${{ matrix.info.package }}

  test_flutter_web:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_web.enable == true }}
    name: 'Test :: Flutter :: Web'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_web.matrix }}

    steps:
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # https://github.com/puppeteer/puppeteer/pull/13196
      - name: Disable AppArmor
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
      - run: cargo install cargo-llvm-cov --version 0.6.24 --locked
      - run: |-
          rustup toolchain install nightly
          rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
      - uses: nanasess/setup-chromedriver@v2
      # ref https://github.com/dewbambs/flutter_github_actions/blob/dev/.github/workflows/e2e_test.yml
      - run: |-
          sleep 15
          export DISPLAY=:99
          chromedriver --port=4444 --verbose &
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &

          sleep 15
          lsof -i :4444

      # execute
      - run: ./frb_internal test-flutter-web --package ${{ matrix.package }} --coverage

      # report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.job }}--${{ matrix.package }}--coverage
          path: target/coverage

  test_flutter_quickstart_smoke:
    needs: plan_ci
    if: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_quickstart_smoke.enable == true }}
    name: 'Test :: Flutter :: Quickstart Smoke:: ${{ matrix.info.platform }} (${{ matrix.info.device }})'
    runs-on: ${{ matrix.info.image }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_ci.outputs.plan).test_flutter_quickstart_smoke.matrix }}

    steps:
      # setup
      - if: ${{ vars.ENABLE_WORKFLOW_TELEMETRY == 'true' }}
        uses: catchpoint/workflow-telemetry-action@v2
        continue-on-error: true
        env:
          WORKFLOW_TELEMETRY_SERVER_PORT: 7778
        with:
          comment_on_pr: false
          job_summary: false
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
      - if: ${{ matrix.info.target == 'web' }}
        run: rustup target add wasm32-unknown-unknown
      - if: ${{ matrix.info.target == 'web' }}
        run: |-
          rustup toolchain install nightly
          rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
      - if: ${{ matrix.info.target == 'android' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17.x"
      - if: ${{ matrix.info.target == 'android' }}
        name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - if: ${{ matrix.info.target == 'android' }}
        name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.info.device }}-api-level-${{ matrix.info.api-level }}
      - if: ${{ matrix.info.target == 'android' && steps.avd-cache.outputs.cache-hit != 'true' }}
        name: Create AVD and generate snapshot for caching
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.info.api-level }}
          force-avd-creation: false
          arch: x86_64
          script: echo "Generated AVD snapshot for caching."
      - if: ${{ matrix.info.target == 'ios' }}
        name: Start Simulator
        run: |
          xcrun xctrace list devices
          UDID=$(/usr/bin/python3 tools/find_ios_simulator_udid.py '${{ matrix.info.device }}')
          echo UDID=$UDID
          echo "UDID=$UDID" >> "$GITHUB_ENV"
          echo "QUICKSTART_SMOKE_DEVICE_ID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "${UDID:?No Simulator with this name found}"
      - if: ${{ runner.os == 'Linux' }}
        run: sudo apt-get update && sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev imagemagick tesseract-ocr
      - if: ${{ matrix.info.target == 'web' || matrix.info.platform == 'linux' }}
        uses: pyvista/setup-headless-display-action@v4
      - if: ${{ runner.os == 'macOS' }}
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install imagemagick tesseract
      - if: ${{ runner.os == 'Windows' }}
        run: |-
          choco install imagemagick.app tesseract -y
          echo "C:\Program Files\Tesseract-OCR" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # execute
      - if: ${{ matrix.info.target == 'android' }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.info.api-level }}
          arch: x86_64
          profile: ${{ matrix.info.device }}
          script: ./frb_internal test-flutter-quickstart-smoke --package ${{ matrix.info.package }} --target android --device-id emulator-5554
      - if: ${{ matrix.info.target != 'android' }}
        shell: bash
        run: ./frb_internal test-flutter-quickstart-smoke --package ${{ matrix.info.package }} --target ${{ matrix.info.target }} --device-id "${QUICKSTART_SMOKE_DEVICE_ID:-${{ matrix.info.device }}}"

      # report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quickstart-smoke--${{ matrix.info.platform }}--${{ matrix.info.device }}--${{ matrix.info.package }}
          path: ${{ matrix.info.package_path }}/target/quickstart_smoke
          if-no-files-found: warn

  # ----------------------------------- misc -----------------------------------

  # Why one separate codecov job: Otherwise, when some jobs upload artifact while some not,
  # the (partial) coverage will show up and be very low - which surely does not reflect actual coverage.
  misc_codecov:
    name: 'Misc :: Codecov'
    runs-on: ubuntu-latest
    # NOTE Even if some previous jobs failed, we still want partial info
    if: ${{ always() && !cancelled() && fromJSON(needs.plan_ci.outputs.plan).misc_codecov.enable == true }}
    # NOTE need to depend on *all* jobs that may generate codecov artifacts
    needs:
      - plan_ci
      - generate_run_frb_codegen_command_generate
      - generate_run_frb_codegen_command_integrate
      - generate_apple_scaffold
      - generate_internal
      # - test_upgrade
      - test_rust
      - test_dart_native
      - test_flutter_web

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: downloaded-artifacts/
          pattern: '*-coverage'
      - run: tree downloaded-artifacts
      - name: Preaggregate Rust coverage
        run: |-
          cd tools/frb_internal
          dart pub get
          dart run bin/flutter_rust_bridge_internal.dart codecov-preaggregate \
            --input-dir ../../downloaded-artifacts \
            --output ../../downloaded-artifacts/preaggregated/rust/codecov.json
          find ../../downloaded-artifacts -name codecov.json ! -path '../../downloaded-artifacts/preaggregated/rust/codecov.json' -delete
      - run: tree downloaded-artifacts

      - uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          directory: downloaded-artifacts
          verbose: true
