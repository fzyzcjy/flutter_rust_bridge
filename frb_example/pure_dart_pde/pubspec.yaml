version: 1.0.0
publish_to: none
environment:
  sdk: ">=3.12.0 <4.0.0"
dependencies:
  benchmark_harness: ^2.4.0
  meta: ^1.18.3
  lints: ^6.1.0
  flutter_rust_bridge:
    path: ../../frb_dart
  flutter_rust_bridge_utils:
    path: ../../frb_utils
  hooks: ^2.0.2
  code_assets: ^1.2.1
  mocktail: ^1.0.5
  vm_service: ^15.2.0
