name: build_tool
description: Cargokit build_tool. Facilitates the build of Rust crate during Flutter application build.
publish_to: none
version: 1.0.1

environment:
  sdk: ">=3.11.0 <4.0.0"
# Add regular dependencies here.
dependencies:
  # these are pinned on purpose because the build_tool_runner doesn't have
  # pubspec.lock. See run_build_tool.sh
  logging: 1.3.0
  path: 1.9.1
  version: 3.0.2
  collection: 1.19.1
  ed25519_edwards: 0.3.1
  hex: 0.2.0
  yaml: 3.1.3
  source_span: 1.10.2
  github: 9.25.0
  args: 2.7.0
  crypto: 3.0.7
  convert: 3.1.2
  http: 1.6.0
  toml: 0.18.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0
